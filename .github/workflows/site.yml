name: Site

on:
  push:
    branches: [main, develop]
    paths:
      - 'site/**'
      - 'docs/**'
      - 'CHANGELOG.md'

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build -w site

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ github.ref == 'refs/heads/main' && secrets.AZURE_SWA_TOKEN_PROD || secrets.AZURE_SWA_TOKEN_DEV }}
          action: upload
          app_location: site/dist
          skip_app_build: true
